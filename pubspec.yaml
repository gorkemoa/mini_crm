name: mini_crm
description: "Freelancer Mini CRM — Offline-first, MVVM, multi-language."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  provider: ^6.1.2
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4+4
  path: ^1.9.0
  path_provider: ^2.1.5
  uuid: ^4.5.1
  shared_preferences: ^2.3.5
  file_picker: ^8.3.7
  share_plus: ^10.1.4
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
